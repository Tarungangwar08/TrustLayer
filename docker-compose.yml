services:
  postgres:
    image: postgres:16-alpine
    container_name: selective_disclosure_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: selective_disclosure
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: selective_disclosure_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/selective_disclosure
      JWT_SECRET: trustlayer-jwt-secret-key-2024-production
      JWT_EXPIRES_IN: 7d
      ENCRYPTION_KEY: trustlayer32charencryptionkey2024
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:5000
    container_name: selective_disclosure_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:5000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    depends_on:
      - backend

volumes:
  postgres_data:
